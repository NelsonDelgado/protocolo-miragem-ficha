<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocolo Miragem - Arquivos</title>
    <link rel="stylesheet" href="style2.css?v=4" />
  </head>
  <body>
    <div id="app-container">
      <!-- TELA DE LOGIN (ESTADO INICIAL) -->
      <div id="login-view">
        <div class="container">
          <img src="heptagrama.png" alt="Heptagrama" class="heptagrama-img" />
          <button
            id="btn-login"
            class="center-hidden-btn"
            title="Autenticar"
          ></button>
        </div>
        <p
          id="login-message"
          style="text-align: center; color: #888; margin-top: -50px"
        >
          Clique no centro para autenticar
        </p>
      </div>

      <!-- DASHBOARD PRINCIPAL (APÓS LOGIN) -->
      <div id="dashboard-view" class="hidden">
        <div style="position: absolute; top: 20px; right: 20px; z-index: 20">
          <span id="user-email" style="margin-right: 15px; color: #aaa"></span>
          <button id="btn-logout" class="btn-dark" style="padding: 8px 12px">
            Sair
          </button>
        </div>

        <!-- SELETOR DE CAMPANHAS -->
        <div id="campaign-dashboard" class="b1">
          <h3>Suas Campanhas</h3>
          <div id="campaign-list" class="lista-personagens-container"></div>
          <hr
            style="border: 0; border-top: 1px dashed #444; margin: 15px 10%"
          />
          <div
            class="new-agent-panel-dark"
            style="background: transparent; border: none; padding: 0"
          >
            <input
              type="text"
              id="input-campaign-name"
              placeholder="Nome da Nova Campanha"
            />
            <button id="btn-create-campaign" class="btn-dark">
              Criar Campanha
            </button>
            <hr
              style="border: 0; border-top: 1px dashed #444; margin: 15px 10%"
            />
            <input
              type="text"
              id="input-campaign-code"
              placeholder="Código para Entrar"
            />
            <button id="btn-join-campaign" class="btn-dark">
              Entrar na Campanha
            </button>
          </div>
        </div>

        <!-- LISTA DE PERSONAGENS (DENTRO DE UMA CAMPANHA) -->
        <div id="agents-view" class="b1 hidden">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              width: 100%;
              margin-bottom: 15px;
            "
          >
            <button id="btn-back-to-campaigns" class="btn-dark">
              &larr; Voltar para Campanhas
            </button>
            <button
              id="btn-escudo-mestre"
              class="btn-dark hidden"
              style="background: #5a0000; border-color: #ff4444; color: #fff"
            >
              🛡️ Escudo do Mestre
            </button>
          </div>
          <div class="new-agent-panel-dark" style="margin-bottom: 20px">
            <h3>Registrar Novo Protocolo</h3>
            <input
              type="text"
              id="input-novo-nome"
              placeholder="Nome do Personagem"
            />
            <button class="btn-dark" id="btn-novo-personagem">
              Criar e Editar
            </button>
          </div>
          <div id="lista-personagens" class="lista-personagens-container"></div>
        </div>
      </div>
    </div>

    <!-- ESCUDO DO MESTRE (MODAL/OVERLAY) -->
    <div id="escudo-mestre-overlay" class="hidden">
      <div class="escudo-mestre-header">
        <h2>🛡️ ESCUDO DO MESTRE</h2>
        <div style="display: flex; gap: 10px;">
          <button id="btn-show-sucessos" class="btn-dark" style="background: #25282c; border-color: #444;">📋 Tabela de Sucessos</button>
          <button id="btn-show-notas" class="btn-dark" style="background: #25282c; border-color: #444;">📝 Notas do Mestre</button>
          <button id="btn-close-escudo" class="btn-dark" style="background: #333">Fechar ❌</button>
        </div>
      </div>
      <div id="escudo-mestre-content" class="agents-grid"></div>
      <div class="escudo-iniciativa-section">
        <h3>⚔️ INICIATIVA</h3>
        <textarea id="escudo-mestre-iniciativa" placeholder="Escreva a iniciativa de todos aqui (agentes e monstros)..."></textarea>
      </div>
    </div>

    <!-- MODAL TABELA DE SUCESSOS (DENTRO DO ESCUDO) -->
    <div id="escudo-sucessos-modal" class="hidden escudo-sub-modal">
      <div class="escudo-sub-modal-content">
        <div class="escudo-sub-modal-header">
          <h3>📋 Tabela de Sucessos</h3>
          <button id="btn-close-sucessos" class="btn-dark">Fechar ❌</button>
        </div>
        <div id="escudo-tabela-sucessos" class="success-table-wrap"></div>
        <p class="table-legend" style="font-size: 11px; margin-top: 10px; text-align: left; line-height: 1.4;">
          R = Rolamento / V = Valor / C = Falha Crítica / F = Falha / S = Sucesso Normal / B = Sucesso Bom / E = Sucesso Extremo
        </p>
      </div>
    </div>

    <!-- MODAL NOTAS DO MESTRE (DENTRO DO ESCUDO) -->
    <div id="escudo-notas-modal" class="hidden escudo-sub-modal">
      <div class="escudo-sub-modal-content">
        <div class="escudo-sub-modal-header">
          <h3>📝 Notas do Mestre</h3>
          <button id="btn-close-notas" class="btn-dark">Fechar ❌</button>
        </div>
        <textarea id="escudo-mestre-notas" placeholder="A carregar notas do Firebase..."></textarea>
      </div>
    </div>

    <script type="module" src="script.js?v=12"></script>
  </body>
</html>
