<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocolo Miragem - Arquivos</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <div class="container">
      <img src="heptagrama.png" alt="Heptagrama" class="heptagrama-img" />

      <button
        id="btn-entrar-circulo"
        class="center-hidden-btn"
        aria-label="Entrar no Círculo"
        title="Entrar no Círculo"
      ></button>

      <div id="painel-agentes" class="b1 hidden">
        <div class="new-agent-panel-dark">
          <h3>Registrar Novo Protocolo</h3>
          <input
            type="text"
            id="input-novo-nome"
            placeholder="Nome do Personagem"
          />
          <button class="btn-dark" id="btn-novo-personagem">
            Criar e Editar
          </button>

          <hr
            style="border: 0; border-top: 1px dashed #444; margin: 15px 10%"
          />

          <input
            type="file"
            id="input-importar"
            accept=".json"
            style="display: none"
          />
          <button
            class="btn-dark"
            onclick="document.getElementById('input-importar').click()"
            title="Importar arquivo JSON de uma ficha salva"
          >
            Importar Ficha
          </button>
        </div>
        <div id="lista-personagens" class="lista-personagens-container"></div>
      </div>
    </div>

    <script src="script.js?v=7"></script>
  </body>
</html>
